name: GlassClaw
options:
  bundleIdPrefix: cl.zro.glassclaw
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - zh-Hant
    - ja
    - ko
    - cs
    - pl
    - pt-BR
    - pt-PT
    - es
    - es-MX
    - fr
    - fr-CA
    - de
    - it
    - nl
    - th
    - ar
    - hi
    - ru
    - sv
    - fi
    - uk
    - el
    - tr
    - da
    - nb
    - ro
    - hu
    - hr
    - sk
    - ms
    - vi
    - id
    - ca

packages:
  meta-wearables-dat-ios:
    url: https://github.com/facebook/meta-wearables-dat-ios.git
    from: "0.3.0"
  HaishinKit:
    url: https://github.com/shogo4405/HaishinKit.swift.git
    from: "2.0.0"

schemes:
  GlassClaw:
    build:
      targets:
        OpenGlasses: all
    run:
      config: Debug

targets:
  OpenGlasses:
    type: application
    platform: iOS
    sources:
      - path: OpenGlasses/Sources
    entitlements:
      path: OpenGlasses/OpenGlasses.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cl.zro.glassclaw
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: G2HJ6YM2ZB
        CODE_SIGN_STYLE: "Automatic"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
        INFOPLIST_FILE: OpenGlasses/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "GlassClaw"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    dependencies:
      - package: meta-wearables-dat-ios
        product: MWDATCore
      - package: meta-wearables-dat-ios
        product: MWDATCamera
      - package: HaishinKit
        product: HaishinKit
      - package: HaishinKit
        product: RTMPHaishinKit
      - target: GlassesActivityWidget

  GlassesActivityWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: GlassesActivityWidget
      - path: OpenGlasses/Sources/Models/GlassesActivityAttributes.swift
    info:
      path: GlassesActivityWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cl.zro.glassclaw.GlassesActivityWidget
        DEVELOPMENT_TEAM: G2HJ6YM2ZB
        CODE_SIGN_STYLE: "Automatic"
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: "YES"

  OpenGlassesWatch:
    type: application
    platform: watchOS
    sources:
      - path: OpenGlassesWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cl.zro.glassclaw.watchkitapp
        DEVELOPMENT_TEAM: G2HJ6YM2ZB
        CODE_SIGN_STYLE: "Automatic"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: OpenGlassesWatch/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
